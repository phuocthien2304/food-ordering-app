name: Tests & Code Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run tests
        working-directory: ./frontend
        run: npm test --if-present || echo "No tests configured"
      
      - name: Run linter
        working-directory: ./frontend
        run: npm run lint --if-present || echo "No linter configured"

      # BƯỚC BỔ SUNG: Gửi log Frontend về Loki
      - name: Gửi log Test Frontend về Loki
        if: always()
        run: |
          TS=$(date +%s)000000000
          curl -H "Content-Type: application/json" -X POST \
          -d '{"streams": [{"stream": {"job": "github-actions", "stage": "test-frontend", "status": "'"${{ job.status }}"'"}, "values": [["'"$TS"'", "Quy trình Test Frontend kết thúc với trạng thái: '"${{ job.status }}"'"]]}]}' \
          http://20.24.208.146:3100/loki/api/v1/push
  
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Test API Gateway
        working-directory: ./backend/api-gateway
        run: |
          npm ci
          npm test --if-present || echo "No tests"
      
      - name: Test User Service
        working-directory: ./backend/user-service
        run: |
          npm ci
          npm test --if-present || echo "No tests"
      
      - name: Test Order Service
        working-directory: ./backend/order-service
        run: |
          npm ci
          npm test --if-present || echo "No tests"

      # BƯỚC BỔ SUNG: Gửi log Backend về Loki
      - name: Gửi log Test Backend về Loki
        if: always()
        run: |
          TS=$(date +%s)000000000
          curl -H "Content-Type: application/json" -X POST \
          -d '{"streams": [{"stream": {"job": "github-actions", "stage": "test-backend", "status": "'"${{ job.status }}"'"}, "values": [["'"$TS"'", "Quy trình Test Backend kết thúc với trạng thái: '"${{ job.status }}"'"]]}]}' \
          http://20.24.208.146:3100/loki/api/v1/push
