name: Deploy to Cloud (Docker Compose)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.aws.yml"
      - "docker-compose.yml"
      - ".github/workflows/deploy-cloud.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA). Default: main"
        required: false
        default: "main"

concurrency:
  group: deploy-cloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3

        # ✅ env: đặt biến ở runner
        env:
          APP_DIR: ${{ secrets.CLOUD_APP_DIR }}
          DEPLOY_REF: ${{ github.event.inputs.ref || github.ref_name }}

        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          port: ${{ secrets.CLOUD_PORT || '22' }}
          script_stop: true
          command_timeout: 30m

          # ✅ envs: forward TÊN biến sang EC2 (không phải key:value)
          envs: APP_DIR,DEPLOY_REF

          script: |
            set -euo pipefail

            DEPLOY_REF="${DEPLOY_REF:-main}"
            APP_DIR="${APP_DIR:-}"

            echo "==> Deploying ref: ${DEPLOY_REF}"
            echo "==> App dir: ${APP_DIR}"
            echo "APP_DIR length: ${#APP_DIR}"

            if [ -z "${APP_DIR}" ]; then
              echo "CLOUD_APP_DIR secret is required (e.g. /home/azureuser/food-odering-app)"
              exit 1
            fi

            cd "${APP_DIR}"

            if [ ! -d ".git" ]; then
              echo "ERROR: ${APP_DIR} is not a git repository. Please clone the repo there first."
              exit 1
            fi

            git fetch --all --tags --prune

            if git show-ref --verify --quiet "refs/remotes/origin/${DEPLOY_REF}"; then
              echo "==> Ref is a branch on origin: ${DEPLOY_REF}"
              git checkout -B "${DEPLOY_REF}" "origin/${DEPLOY_REF}"
              git pull --ff-only origin "${DEPLOY_REF}"
            else
              echo "==> Ref is tag/SHA (or non-origin branch): ${DEPLOY_REF}"
              git checkout --detach "${DEPLOY_REF}"
            fi

            echo "==> Current commit:"
            git rev-parse --short HEAD

            echo "==> Docker compose deploy"
            docker compose -f docker-compose.aws.yml pull || true
            docker compose -f docker-compose.aws.yml up -d --build --remove-orphans

            echo "==> Prune old images"
            docker image prune -f

            echo "==> Done"
            docker ps

      # Gửi log Deploy về Loki
      - name: Gửi log Deploy về Loki
        if: always()
        run: |
          TS=$(date +%s)000000000
          curl -H "Content-Type: application/json" -X POST \
          -d '{"streams": [{"stream": {"job": "github-actions", "stage": "deploy", "status": "'"${{ job.status }}"'"}, "values": [["'"$TS"'", "Quy trình Deploy Cloud kết thúc với trạng thái: '"${{ job.status }}"'"]]}]}' \
          http://20.24.208.146:3100/loki/api/v1/push
